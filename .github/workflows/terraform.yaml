name: Terraform CI/CD

on:
  workflow_dispatch:
    inputs:
      apply:
        description: 'Executar o Terraform apply'
        required: true
        default: 'false'
        type: choice
        options:
          - true
          - false

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug
        run: |
          pwd
          ls -R

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::339855175962:role/GitHubinfraRole
          aws-region: us-east-2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform -chdir=fase-3-docker-aws-terraform init

      - name: Terraform Validate
        run: terraform -chdir=fase-3-docker-aws-terraform validate

      - name: Terraform Plan
        run: terraform -chdir=fase-3-docker-aws-terraform plan -out=tfplan

      - name: Terraform Apply
        run: terraform -chdir=fase-3-docker-aws-terraform apply -auto-approve tfplan
        if: github.event.inputs.apply == 'true'