name: Terraform CI/CD

on:
  workflow_dispatch:
    inputs:
      apply:
        description: 'Executar o Terraform apply'
        required: true
        default: 'false'
        type: choice
        options:
          - true
          - false

      plan_destroy:
        description: 'Planejar o destroy do ambiente?'
        required: true
        default: 'false'
        type: choice
        options:
          - true
          - false

      destroy:
        description: 'Destruir ambiente?'
        required: true
        default: 'false'
        type: choice
        options:
          - true
          - false

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::339855175962:role/GitHubinfraRole
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: fase-3-docker-aws-terraform
        run: terraform init

      - name: Terraform Validate
        working-directory: fase-3-docker-aws-terraform
        run: terraform validate

      - name: Terraform Plan
        working-directory: fase-3-docker-aws-terraform
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        working-directory: fase-3-docker-aws-terraform
        run: terraform apply -auto-approve tfplan
        if: github.event.inputs.apply == 'true'

      - name: Plan Destroy
        working-directory: fase-3-docker-aws-terraform
        run: terraform plan -destroy -out=tfplan-destroy
        if: github.event.inputs.plan_destroy == 'true'

      - name: Terraform Destroy
        working-directory: fase-3-docker-aws-terraform
        run: terraform apply -auto-approve tfplan-destroy
        if: github.event.inputs.destroy == 'true'